name: E2E Tests

on:
  pull_request:
    branches: [main]
  schedule:
    # Daily smoke run against the live site.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run-tests
        env:
          # Keep stdout free of ANSI codes so the parsing step below can grep/awk it reliably.
          FORCE_COLOR: '0'
        run: |
          # Without pipefail, bash's exit code for a pipeline is tee's (always 0, since it
          # can always write the log), so a failing `playwright test` would be masked and
          # this step — and the job — would report success. Not the default here (`bash -e`,
          # no `-o pipefail`), so it's set explicitly.
          set -o pipefail
          # No --reporter override: playwright.config.ts already configures list (stdout,
          # parsed below) + html (playwright-report/, uploaded below) together.
          npx playwright test | tee playwright-output.log

      - name: Report results
        uses: ./.github/actions/pw-report-notify
        with:
          log-file: playwright-output.log
          label: e2e
          artifact-name: playwright-report
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # No `playwright install` here: these are pure HTTP contract tests against
      # api/api-client.ts (see tests/api/), so no browser is ever launched.

      - name: Run Playwright API tests
        id: run-tests
        env:
          FORCE_COLOR: '0'
        run: |
          # See the e2e job's matching step: without this, a failing `playwright test`
          # would be masked by tee's own (always-0) exit code and the job would report
          # success regardless of test results.
          set -o pipefail
          npx playwright test tests/api/ | tee playwright-output.log

      - name: Report results
        uses: ./.github/actions/pw-report-notify
        with:
          log-file: playwright-output.log
          label: API tests
          artifact-name: playwright-report-api
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
