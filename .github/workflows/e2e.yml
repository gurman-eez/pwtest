name: E2E Tests

on:
  pull_request:
    branches: [main]
  schedule:
    # Daily smoke run against the live site.
    - cron: '0 6 * * *'
  workflow_dispatch:

# Needed so the "Publish HTML report" step in each job can push into gh-pages.
permissions:
  contents: write

jobs:
  login-signup:
    needs: api-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
      TESTRAIL_EMAIL: ${{ secrets.TESTRAIL_EMAIL }}
      TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
      TESTRAIL_PROJECT_ID: ${{ vars.TESTRAIL_PROJECT_ID }}
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      # Read by scripts/classify-failure.ts (called from publish-testrail-results.ts, right
      # before a Jira bug is filed for a stable failure). Optional in practice — classifyFailure()
      # skips itself and logs if this is unset, same as a missing screenshot; a bug still gets
      # filed either way, just without the AI classification block.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run-tests
        env:
          # Keep stdout free of ANSI codes so the parsing step below can grep/awk it reliably.
          FORCE_COLOR: '0'
        run: |
          # Without pipefail, bash's exit code for a pipeline is tee's (always 0, since it
          # can always write the log), so a failing `playwright test` would be masked and
          # this step — and the job — would report success. Not the default here (`bash -e`,
          # no `-o pipefail`), so it's set explicitly.
          set -o pipefail
          # No --reporter override: playwright.config.ts already configures list (stdout,
          # parsed below) + html (playwright-report/, uploaded below) + json (TestRail,
          # published below) together.
          npx playwright test tests/login-signup.spec.ts | tee playwright-output.log

      - name: Publish HTML report
        if: always()
        uses: ./.github/actions/publish-html-report
        with:
          report-dir: playwright-report
          job-name: login-signup
          run-id: ${{ github.run_id }}
          retention: '20'

      - name: Publish to TestRail / file Jira bugs
        if: always()
        uses: ./.github/actions/publish-to-testrail
        with:
          report-json-path: test-results/results.json
          testrail-suite-id: ${{ vars.TESTRAIL_SUITE_LOGIN_ID }}
          run-name: 'login-signup — ${{ github.event_name }} — run ${{ github.run_id }}'
          report-url: https://gurman-eez.github.io/pwtest/runs/login-signup/${{ github.run_id }}/
          jira-project-key: ${{ vars.JIRA_PROJECT_KEY }}
          jira-bug-type: ${{ vars.JIRA_BUG_TYPE }}

      # Runs after "Publish to TestRail / file Jira bugs" (not before, as in a simpler pipeline)
      # specifically so test-results/failure-classifications.json — written by that step — is
      # already on disk when this one parses failures, letting it append a short
      # "🔍 likely: <category>" badge per failed title (see report-to-slack/action.yml).
      - name: Report to Slack
        if: always()
        uses: ./.github/actions/report-to-slack
        with:
          job-status: ${{ job.status }}
          test-summary-path: playwright-output.log
          label: login-signup
          trigger-type: ${{ github.event_name }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          report-url: https://gurman-eez.github.io/pwtest/runs/login-signup/${{ github.run_id }}/

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-login-signup
          path: playwright-report/
          retention-days: 14

  checkout:
    needs: api-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
      TESTRAIL_EMAIL: ${{ secrets.TESTRAIL_EMAIL }}
      TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
      TESTRAIL_PROJECT_ID: ${{ vars.TESTRAIL_PROJECT_ID }}
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      # Read by scripts/classify-failure.ts (called from publish-testrail-results.ts, right
      # before a Jira bug is filed for a stable failure). Optional in practice — classifyFailure()
      # skips itself and logs if this is unset, same as a missing screenshot; a bug still gets
      # filed either way, just without the AI classification block.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: run-tests
        env:
          FORCE_COLOR: '0'
        run: |
          set -o pipefail
          npx playwright test tests/checkout.spec.ts | tee playwright-output.log

      - name: Publish HTML report
        if: always()
        uses: ./.github/actions/publish-html-report
        with:
          report-dir: playwright-report
          job-name: checkout
          run-id: ${{ github.run_id }}
          retention: '20'

      - name: Publish to TestRail / file Jira bugs
        if: always()
        uses: ./.github/actions/publish-to-testrail
        with:
          report-json-path: test-results/results.json
          testrail-suite-id: ${{ vars.TESTRAIL_SUITE_PAYMENT_ID }}
          run-name: 'checkout — ${{ github.event_name }} — run ${{ github.run_id }}'
          report-url: https://gurman-eez.github.io/pwtest/runs/checkout/${{ github.run_id }}/
          jira-project-key: ${{ vars.JIRA_PROJECT_KEY }}
          jira-bug-type: ${{ vars.JIRA_BUG_TYPE }}

      # See the matching comment in the login-signup job: runs after the TestRail/Jira step on
      # purpose, so failure-classifications.json exists in time for the Slack badge below.
      - name: Report to Slack
        if: always()
        uses: ./.github/actions/report-to-slack
        with:
          job-status: ${{ job.status }}
          test-summary-path: playwright-output.log
          label: checkout
          trigger-type: ${{ github.event_name }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          report-url: https://gurman-eez.github.io/pwtest/runs/checkout/${{ github.run_id }}/

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-checkout
          path: playwright-report/
          retention-days: 14

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
      TESTRAIL_EMAIL: ${{ secrets.TESTRAIL_EMAIL }}
      TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
      TESTRAIL_PROJECT_ID: ${{ vars.TESTRAIL_PROJECT_ID }}
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      # Read by scripts/classify-failure.ts (called from publish-testrail-results.ts, right
      # before a Jira bug is filed for a stable failure). Optional in practice — classifyFailure()
      # skips itself and logs if this is unset, same as a missing screenshot; a bug still gets
      # filed either way, just without the AI classification block.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # No `playwright install` here: these are pure HTTP contract tests against
      # api/api-client.ts (see tests/api/), so no browser is ever launched.

      - name: Run Playwright API tests
        id: run-tests
        env:
          FORCE_COLOR: '0'
        run: |
          # See the login-signup/checkout jobs' matching step: without this, a failing
          # `playwright test` would be masked by tee's own (always-0) exit code and the
          # job would report success regardless of test results.
          set -o pipefail
          npx playwright test tests/api/ | tee playwright-output.log

      - name: Publish HTML report
        if: always()
        uses: ./.github/actions/publish-html-report
        with:
          report-dir: playwright-report
          job-name: api-tests
          run-id: ${{ github.run_id }}
          retention: '20'

      # TODO(testrail-api-coverage): enable once tests/api/*.spec.ts carry TestRail case-id
      # annotations (`{ type: 'testrail', description: 'C<id>' }`, same pattern as
      # tests/login-signup.spec.ts / tests/checkout.spec.ts) and a TestRail suite/section
      # exists for the API contract tests. Wired up now (same composite action as the other
      # two jobs, including the Jira stable-failure bug filing added alongside it) but
      # disabled — with no annotated tests, this would just create empty TestRail runs, and
      # there's no TestRail case/refs to label a Jira bug with either. Kept before "Report to
      # Slack" for structural symmetry with the other two jobs even though it's a no-op here.
      - name: Publish to TestRail / file Jira bugs
        if: false
        uses: ./.github/actions/publish-to-testrail
        with:
          report-json-path: test-results/results.json
          testrail-suite-id: ${{ vars.TESTRAIL_SUITE_API_ID }}
          run-name: 'API tests — ${{ github.event_name }} — run ${{ github.run_id }}'
          report-url: https://gurman-eez.github.io/pwtest/runs/api-tests/${{ github.run_id }}/
          jira-project-key: ${{ vars.JIRA_PROJECT_KEY }}
          jira-bug-type: ${{ vars.JIRA_BUG_TYPE }}

      - name: Report to Slack
        if: always()
        uses: ./.github/actions/report-to-slack
        with:
          job-status: ${{ job.status }}
          test-summary-path: playwright-output.log
          label: API tests
          trigger-type: ${{ github.event_name }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          report-url: https://gurman-eez.github.io/pwtest/runs/api-tests/${{ github.run_id }}/

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 14
