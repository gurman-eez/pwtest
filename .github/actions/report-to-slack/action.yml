name: 'Report Playwright results to Slack'
description: >-
  Parses a captured `playwright test` list-reporter log and posts a pass/fail
  summary to Slack (verbose with failed test titles on failure). Shared by
  every job that runs a Playwright suite in CI. Artifact upload is a separate
  step in the caller — this action only handles the Slack message.

inputs:
  job-status:
    description: >-
      Overall job status so far, e.g. the job.status context. Treated as a
      failure unless exactly "success" — catches cases where the test step
      itself crashed before producing a parseable summary line.
    required: true
  test-summary-path:
    description: 'Path to the captured playwright list-reporter stdout (e.g. from `... | tee playwright-output.log`)'
    required: true
  label:
    description: 'Short label identifying this run in the Slack message, e.g. "login-signup" or "API tests"'
    required: true
  trigger-type:
    description: 'Raw github.event_name value from the calling workflow (mapped to "PR"/"schedule"/raw value in the message)'
    required: true
  webhook-url:
    description: 'Slack incoming webhook URL. Composite actions cannot read the caller''s secrets context directly, so the caller must pass it explicitly.'
    required: true
  report-url:
    description: >-
      Predictable URL to this run's published Playwright HTML report (e.g. GitHub Pages
      runs/<job-name>/<run-id>/), built by the caller job before this action is called.
      Included in both the success and failure Slack messages; unrelated to TestRail
      publishing, which is a separate step run independently in the same job.
    required: true

runs:
  using: composite
  steps:
    - name: Parse Playwright results
      id: parse-results
      if: always()
      shell: bash
      run: |
        LOG_FILE="${{ inputs.test-summary-path }}"
        LABEL="${{ inputs.label }}"
        JOB_STATUS="${{ inputs.job-status }}"
        REPORT_URL="${{ inputs.report-url }}"

        PASSED=$(grep -oE '^[[:space:]]*[0-9]+ passed' "$LOG_FILE" | grep -oE '[0-9]+' | tail -1 || true)
        FAILED=$(grep -oE '^[[:space:]]*[0-9]+ failed' "$LOG_FILE" | grep -oE '[0-9]+' | tail -1 || true)
        PASSED=${PASSED:-0}
        FAILED=${FAILED:-0}
        TOTAL=$((PASSED + FAILED))

        # The list reporter prints failed test titles as an indented block right after the
        # "N failed" summary line and right before the final "N passed (Xs)" line.
        FAILED_TITLES=$(awk '/^[[:space:]]*[0-9]+ failed[[:space:]]*$/{flag=1; next} /^[[:space:]]*[0-9]+ passed/{flag=0} flag && NF {sub(/^[[:space:]]+/, ""); print}' "$LOG_FILE")

        case "${{ inputs.trigger-type }}" in
          schedule) TRIGGER="schedule" ;;
          pull_request) TRIGGER="PR" ;;
          *) TRIGGER="${{ inputs.trigger-type }}" ;;
        esac

        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        if [ "$JOB_STATUS" = "success" ] && [ "$FAILED" -eq 0 ]; then
          MESSAGE="✅ ${PASSED}/${TOTAL} ${LABEL} passed (${TRIGGER}) — <${REPORT_URL}|Report>"
        else
          if [ "${{ inputs.trigger-type }}" = "schedule" ]; then
            HEADER="❌ ${FAILED}/${TOTAL} ${LABEL} failed — smoke test failure on live site (${TRIGGER})"
          else
            HEADER="❌ ${FAILED}/${TOTAL} ${LABEL} failed (${TRIGGER})"
          fi

          TITLES_LIST=$(echo "$FAILED_TITLES" | awk '{print "• " $0}')

          MESSAGE=$(printf '%s\n\nFailed tests:\n%s\n\n<%s|View run> · <%s|HTML report>' "$HEADER" "$TITLES_LIST" "$RUN_URL" "$REPORT_URL")
        fi

        {
          echo "slack_message<<SLACK_MESSAGE_EOF"
          echo "$MESSAGE"
          echo "SLACK_MESSAGE_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Notify Slack
      if: always()
      continue-on-error: true
      uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
      with:
        webhook: ${{ inputs.webhook-url }}
        webhook-type: incoming-webhook
        payload: |
          {
            "text": ${{ toJSON(steps.parse-results.outputs.slack_message) }}
          }
